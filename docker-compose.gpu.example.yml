services:
  bot:
    image: ghcr.io/lam183/zalo-ai-gpu:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3070:3000"
      - "3069:3001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db
      VIENEU_GPU_ENABLED: ${VIENEU_GPU_ENABLED:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Voicechat is OFF by default in this example.
      # To enable: set VOICE_ENABLED=true and VOICE_HOST_URL=https://voice.your-domain.com
      # Then uncomment tunnel service below (or use your own reverse proxy).
      VOICE_ENABLED: "false"
      VOICE_ONLY_MODE: "false"
      VOICE_HOST_URL: ""
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models
    gpus: all

