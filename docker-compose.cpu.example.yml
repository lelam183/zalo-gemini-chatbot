services:
  bot:
    image: ghcr.io/lam183/zalo-ai-cpu:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3070:3000"
      - "3069:3001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db
      # Chế độ CPU
      VIENEU_GPU_ENABLED: "false"
      NVIDIA_VISIBLE_DEVICES: ""
      CUDA_VISIBLE_DEVICES: ""
      # Voicechat đang TẮT mặc định trong file mẫu này.
      # Muốn bật voicechat: đặt VOICE_ENABLED=true, đặt VOICE_HOST_URL hợp lệ,
      # rồi chạy kèm profile tunnel (hoặc dùng reverse proxy công khai của riêng bạn).
      VOICE_ENABLED: "false"
      VOICE_ONLY_MODE: "false"
      VOICE_HOST_URL: ""
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models

  # Bỏ comment để phát VOICE_HOST_URL ra URL công khai qua Cloudflare Tunnel:
  # tunnel:
  #   profiles: ["tunnel"]
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
