# Community-style sample compose:
# - keep configuration in .env via env_file
# - avoid hardcoding large env blocks in compose
# - keep optional services behind profiles
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: zalo-ai:cpu
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3070:3000"
      - "3069:3001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db
      # CPU default mode
      VIENEU_GPU_ENABLED: "false"
      NVIDIA_VISIBLE_DEVICES: ""
      CUDA_VISIBLE_DEVICES: ""
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models

  tunnel:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - bot
