services:
  bot:
    image: ghcr.io/lelam183/zalo-ai-cpu:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db
      # Chế độ CPU
      VIENEU_GPU_ENABLED: "false"
      LOCAL_ASR_DEVICE: "cpu"
      LOCAL_ASR_COMPUTE: "int8"
      VIDEO_FORCE_CPU: "true"
      CT2_FORCE_CPU_ISA: AVX2
      ONEDNN_MAX_CPU_ISA: AVX2
      ONEDNN_CPU_ISA_HINTS: PREFER_YMM
      MKL_ENABLE_INSTRUCTIONS: AVX2
      # Voicechat đang TẮT mặc định trong file mẫu này.
      # Muốn bật voicechat: đặt VOICE_ENABLED=true, đặt VOICE_HOST_URL hợp lệ,
      # rồi chạy kèm profile tunnel (hoặc dùng reverse proxy công khai của riêng bạn).
      VOICE_ENABLED: "false"
      VOICE_ONLY_MODE: "false"
      VOICE_HOST_URL: ""
      VOICE_SAMPLES_DIR: /app/voice_samples
      # Sau khi đã tải xong model vào hf_cache thì có thể chuyển thành "1" để chạy offline.
      HF_HUB_OFFLINE: "0"
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models
      - ./voice-samples/data/ref_audio:/app/voice_samples

  # Bỏ comment để phát VOICE_HOST_URL ra URL công khai qua Cloudflare Tunnel:
  # tunnel:
