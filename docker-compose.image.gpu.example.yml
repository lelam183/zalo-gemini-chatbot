services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: zalo-ai:gpu
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "3001:3001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # Runtime / paths
      TZ: Asia/Ho_Chi_Minh
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db

      # Gemini models & bot behavior (không nhạy cảm)
      GEMINI_MODEL: gemini-3.1-flash-lite-preview,gemini-2.5-flash-lite,gemma-3-27b-it,gemini-3-flash-preview
      GEMINI_VISION_MODELS: gemini-2.5-flash,gemini-3-flash-preview,gemini-3-pro-preview,gemini-3.1-flash-lite-preview,gemini-2.5-flash-lite
      GEMINI_SEARCH_MODELS: gemini-2.5-flash-lite,gemini-2.5-flash,gemini-3.1-flash-lite-preview,gemini-3-flash-preview,gemini-2.5-pro
      GEMINI_AUDIO_MODEL: gemini-2.5-flash,gemini-2.5-flash-lite,gemini-3.1-flash-lite-preview,gemini-3-flash-preview,gemini-2.5-pro
      GEMINI_TEMPERATURE: "1.1"
      SYSTEM_PROMPT: Yui - friendly Vietnamese chat bot. Keep replies short and natural.
      ENABLE_SEARCH: "false"
      CAUTION_USERS: ""
      GROUP_PREFIX: "@yui "
      BOT_MENTION_ALIASES: yui,commit,bot,ai
      MEMBER_ALIASES: ""
      BOT_OWNER_NAME: Your Name
      BOT_OWNER_UID: ""

      # GPU runtime (không để trong .env để tránh rối)
      VIENEU_GPU_ENABLED: "true"
      NVIDIA_VISIBLE_DEVICES: all
      # Route các luồng xử lý AI tới GPU 0 mặc định (đổi thành 1, 2... nếu có nhiều card)
      ASR_CUDA_VISIBLE_DEVICES: "0"
      VOICE_CUDA_VISIBLE_DEVICES: "0"
      VIDEO_CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

      # ASR local (GPU)
      LOCAL_ASR_DEVICE: "cuda"
      LOCAL_ASR_COMPUTE: "float16"
      LOCAL_ASR_CPU_COMPUTE: "int8"
      LOCAL_ASR_OOM_FALLBACK_CPU: "true"

      # Video (Gemini, không dùng local)
      VIDEO_AI_ENABLED: "true"
      VIDEO_AI_PROVIDER: "gemini"
      GEMINI_VIDEO_MODELS: gemini-2.5-flash-lite,gemini-3.1-flash-lite-preview,gemini-2.5-flash,gemini-3-flash-preview
      GEMINI_VIDEO_MODEL: ""
      GEMINI_VIDEO_TIMEOUT_MS: "90000"
      GEMINI_VIDEO_POLL_MS: "2500"
      GEMINI_VIDEO_POLL_TIMEOUT_MS: "120000"
      YOUTUBE_VIDEO_AI_ENABLED: "true"
      VIDEO_ASR_MAX_SECONDS: "120"
      VIDEO_FORCE_CPU: "false"
      VIDEO_LOCAL_FILES_ONLY: "false"
      LOCAL_ASR_MODEL: large-v3-turbo
      LOCAL_ASR_LANG: auto
      VIDEO_ASR_ALLOWED_LANGS: vi,en,ja
      LOCAL_ASR_FALLBACK_LANG: vi
      LOCAL_ASR_BEAM_SIZE: "5"

      # Voice defaults
      TRANSCRIPT: "false"
      TRANSCRIPT_DELAY_MS: "1000"
      VOICE_SEND_METHOD: voice_url_first
      VOICE_OUTPUT_EXT: aac
      VOICE_NATIVE_EMULATION: "true"
      VOICE_NATIVE_EXT: mp3
      VOICE_NATIVE_TTL_MS: "60000"
      VOICE_TTL_MAX_MS: "12000"
      VIENEU_MAX_STRETCH_RATIO: "2.6"
      VOICE_PORT: "3001"
      VOICE_TIMEOUT_S: "300"
      VOICE_FILE_TTL_HOURS: "720"
      VOICE_TMP_DIR: /app/data/voice_tmp
      ACTIVE_CONV_TTL_MS: "120000"

      # VieNeu (BẮT BUỘC cho voice_pipeline.py)
      USE_VIENEU_TTS: "true"
      VIENEU_MODE: turbo
      VIENEU_MODELS: pnnbao-ump/VieNeu-TTS-v2-Turbo
      VIENEU_MODEL: pnnbao-ump/VieNeu-TTS-v2-Turbo
      VIENEU_API_BASE: ""
      VIENEU_REF_AUDIO: ""
      # Voicechat đang TẮT mặc định trong file mẫu này.
      # Muốn bật voicechat: đặt VOICE_ENABLED=true, đặt VOICE_HOST_URL hợp lệ,
      # rồi chạy kèm profile tunnel (hoặc dùng reverse proxy công khai của riêng bạn).
      VOICE_ENABLED: "false"
      VOICE_ONLY_MODE: "false"
      VOICE_HOST_URL: ""
      VOICE_SAMPLES_DIR: /app/voice_samples
      # Sau khi đã tải xong model vào hf_cache thì có thể chuyển thành "1" để chạy offline.
      HF_HUB_OFFLINE: "0"
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models
      - ./voice-samples/data/ref_audio:/app/voice_samples

  # Bỏ comment để phát VOICE_HOST_URL ra URL công khai qua Cloudflare Tunnel:
  # tunnel:
