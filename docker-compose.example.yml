# File compose mẫu theo kiểu cộng đồng:
# - giữ cấu hình trong .env qua env_file
# - tránh nhét block env quá dài trong compose
# - các service tùy chọn để sau profile
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: zalo-ai:cpu
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db
      # Mặc định chạy an toàn theo CPU
      VIENEU_GPU_ENABLED: "false"
      NVIDIA_VISIBLE_DEVICES: ""
      CUDA_VISIBLE_DEVICES: ""
      VOICE_SAMPLES_DIR: /app/voice_samples
      # Sau khi đã tải xong model vào hf_cache thì có thể chuyển thành "1" để chạy offline.
      HF_HUB_OFFLINE: "0"
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models
      - ./voice-samples/data/ref_audio:/app/voice_samples

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - bot
