services:
  bot:
    image: ghcr.io/lelam183/zalo-ai-gpu:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      SESSION_FILE: /app/data/session.json
      HISTORY_DIR: /app/data/history
      DB_PATH: /app/data/history/bot.db
      VIENEU_GPU_ENABLED: ${VIENEU_GPU_ENABLED:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Voicechat đang TẮT mặc định trong file mẫu này.
      # Muốn bật: đặt VOICE_ENABLED=true và VOICE_HOST_URL=https://voice.your-domain.com
      # Sau đó bỏ comment service tunnel bên dưới (hoặc dùng reverse proxy riêng).
      VOICE_ENABLED: "false"
      VOICE_ONLY_MODE: "false"
      VOICE_HOST_URL: ""
      VOICE_SAMPLES_DIR: /app/voice_samples
      # Sau khi đã tải xong model vào hf_cache thì có thể chuyển thành "1" để chạy offline.
      HF_HUB_OFFLINE: "0"
    volumes:
      - ./data:/app/data
      - ./hf_cache:/app/hf_cache
      - ./torch_cache:/app/torch_cache
      - ./models:/app/models
      - ./voice-samples/data/ref_audio:/app/voice_samples
    gpus: all

